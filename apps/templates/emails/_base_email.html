<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Jàngu Bi{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F8FCFF;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #0B1A2E;
    }
    .wrapper {
      width: 100%;
      background-color: #F8FCFF;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #FFFFFF;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(11,26,46,0.08);
    }
    .header {
      background-color: #0B1A2E;
      padding: 28px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #D9A835;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .header .tagline {
      margin: 6px 0 0;
      color: #607B99;
      font-size: 13px;
    }
    .content {
      padding: 40px 40px 32px;
      font-size: 15px;
      line-height: 1.7;
      color: #0B1A2E;
    }
    .content h1 {
      font-size: 22px;
      color: #0B1A2E;
      font-family: Georgia, 'Times New Roman', serif;
      margin-top: 0;
      margin-bottom: 16px;
    }
    .content p {
      margin: 0 0 16px;
    }
    .button {
      display: inline-block;
      background-color: #1A8FCC;
      color: #FFFFFF !important;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 6px;
      margin: 8px 0 24px;
    }
    .button-danger {
      display: inline-block;
      background-color: #EF4444;
      color: #FFFFFF !important;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 6px;
      margin: 8px 0 24px;
    }
    .address-block {
      background-color: #F8FCFF;
      border: 1px solid #D4E8F7;
      border-radius: 6px;
      padding: 16px 20px;
      margin: 16px 0;
      font-size: 14px;
      line-height: 1.9;
      color: #0B1A2E;
    }
    .otp-code {
      font-size: 36px;
      font-weight: bold;
      color: #D9A835;
      background-color: #FDF8EC;
      padding: 20px 32px;
      border-radius: 6px;
      display: inline-block;
      border: 2px solid #D9A835;
      letter-spacing: 8px;
    }
    .footer {
      background-color: #F8FCFF;
      border-top: 1px solid #D4E8F7;
      padding: 20px 40px;
      text-align: center;
      font-size: 12px;
      color: #607B99;
    }
    .footer a {
      color: #1A8FCC;
      text-decoration: none;
    }
    .brand { color: #D9A835; }
    .link-muted { color: #1A8FCC; word-break: break-all; }
    .text-muted { color: #607B99; }
    .text-danger { color: #EF4444; }

    {% block extra_styles %}{% endblock %}

    /* ── Dark mode ─────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body, .wrapper {
        background-color: #07101A !important;
        color: #F6F8FB !important;
      }
      .container {
        background-color: #0E1D31 !important;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
      }
      .header .tagline { color: #8B96A8 !important; }
      .content { color: #F6F8FB !important; }
      .content h1 { color: #F6F8FB !important; }
      .address-block {
        background-color: #0F1A29 !important;
        border-color: #243447 !important;
        color: #F6F8FB !important;
      }
      .otp-code {
        color: #E8B83E !important;
        background-color: #1C1500 !important;
        border-color: #E8B83E !important;
      }
      .button {
        background-color: #70CBFF !important;
        color: #07101A !important;
      }
      .button-danger { background-color: #F87171 !important; }
      .footer {
        background-color: #0F1A29 !important;
        border-top-color: #243447 !important;
        color: #8B96A8 !important;
      }
      .footer a { color: #70CBFF !important; }
      .brand { color: #E8B83E !important; }
      .link-muted { color: #70CBFF !important; }
      .text-muted { color: #8B96A8 !important; }
      .text-danger { color: #F87171 !important; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>Jàngu Bi</h1>
        <p class="tagline">Plateforme catholique du Sénégal</p>
      </div>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>
          &copy; {% now "Y" %} Jàngu Bi — Tous droits réservés.<br>
          Ce message est envoyé automatiquement, merci de ne pas y répondre.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
