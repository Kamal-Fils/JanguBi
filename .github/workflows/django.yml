name: CI JanguBi Backend

on:
  push:
    branches:
      - main
      - develop
      - stage
    tags:
      - 'v*'

  pull_request:
    branches:
      - main
      - develop
      - stage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04              

    services:
      postgres:
        image: pgvector/pgvector:pg17 
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jangubi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine         
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec #v6.2.0
        with:
          python-version: "3.12.4"
          cache: "pip"
          cache-dependency-path: |
            requirements/local.txt
            requirements/base.txt

      - name: Cache pip agressif
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: /opt/hostedtoolcache/Python/3.12.4/x64/
          key: python-${{ hashFiles('requirements/local.txt') }}-${{ hashFiles('requirements/base.txt') }}

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Run ruff
        run: ruff check apps/

      - name: Type check
        run: mypy --config mypy.ini apps/

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.django.test
          SECRET_KEY: "ci-only-secret-key-not-for-production"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/jangubi_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_TASK_ALWAYS_EAGER: "True"         
          CELERY_TASK_EAGER_PROPAGATES: "True"
        run: pytest apps/ -v --tb=short

  build-docker:
     needs: build
     runs-on: ubuntu-24.04

     steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@22b48a429f10e1de233237b5c534c9c3d2e41597 #v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 #v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@3caf19fbe3db1a1a6a8bdce189e09ac0ed35d513 #v6.1.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/jangubi-backend
          tags: |
            type=semver,pattern={{version}}

            type=semver,pattern={{major}}.{{minor}}

            type=raw,value={{branch}}-{{sha}}

            type=sha

          # Les labels = métadonnées embarquées dans l'image
          # (visibles avec docker inspect)
          # metadata-action les génère automatiquement (auteur, repo, commit...)


      - name: Build and push
        uses: docker/build-push-action@f72b3cf665d7d5fe435407befecb40d10b4266d2 #v7.2.0
        with:
          context: .
          file: docker/production.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # ↑ Réutilise les tags générés par le step "meta" ci-dessus
          #   GitHub Actions connecte automatiquement les outputs/inputs entre steps

          labels: ${{ steps.meta.outputs.labels }}
          # ↑ Les métadonnées générées automatiquement

          cache-from: type=gha
          # ↑ Lire le cache depuis GitHub Actions Cache
          #   "gha" = GitHub Actions (intégré, gratuit jusqu'à 10GB)
          #   Au 2ème run : les layers Docker déjà buildés sont récupérés
          #   → Build 4 min → 45 secondes

          cache-to: type=gha,mode=max
          # ↑ Écrire le cache vers GitHub Actions Cache
          #   mode=max = cache TOUTES les couches intermédiaires
          #   (pas seulement le résultat final)