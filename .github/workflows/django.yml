name: CI JanguBi Backend

on:
  push:
    branches:
      - main
      - develop
      - stage
  pull_request:
    branches:
      - main
      - develop
      - stage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04              

    services:
      postgres:
        image: pgvector/pgvector:pg17 
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jangubi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine         
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec #v6.2.0
        with:
          python-version: "3.12.4"
          cache: "pip"
          cache-dependency-path: |
            requirements/local.txt
            requirements/base.txt

      - name: Cache pip agressif
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: /opt/hostedtoolcache/Python/3.12.4/x64/
          key: python-${{ hashFiles('requirements/local.txt') }}-${{ hashFiles('requirements/base.txt') }}

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Run ruff
        run: ruff check apps/

      - name: Type check
        run: mypy --config mypy.ini apps/

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.django.test   # ✅ après création du fichier
          SECRET_KEY: "ci-only-secret-key-not-for-production"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/jangubi_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_TASK_ALWAYS_EAGER: "True"             # ✅ pas besoin de RabbitMQ
          CELERY_TASK_EAGER_PROPAGATES: "True"
        run: pytest apps/ -v --tb=short